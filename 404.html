<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIOS // Signal Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Archivo:wght@300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a0a0f;
            --secondary-pink: #e91e63;
            --accent-cyan: #00d9ff;
        }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Archivo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glitch-box {
            position: relative;
            border: 1px solid var(--accent-cyan);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
            background: rgba(10, 10, 15, 0.8);
            z-index: 3;
            animation: hardware-flicker 4s infinite;
        }

        /* Glitchy H1 Header */
        h1 {
            font-family: 'Orbitron';
            color: var(--secondary-pink);
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1::before,
        h1::after {
            content: "SIGNAL NOT FOUND";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
        }

        h1::before {
            left: 2px;
            text-shadow: -2px 0 var(--accent-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        h1::after {
            left: -2px;
            text-shadow: -2px 0 var(--secondary-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-2 1s infinite linear alternate-reverse;
        }

        p {
            color: #8888a8;
            max-width: 300px;
            line-height: 1.6;
            margin: 0 auto 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid var(--secondary-pink);
            color: var(--secondary-pink);
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--secondary-pink);
            color: white;
            box-shadow: 0 0 15px var(--secondary-pink);
        }

        /* Animations */
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(58px, 9999px, 43px, 0); }
            80% { clip: rect(90px, 9999px, 86px, 0); }
            100% { clip: rect(41px, 9999px, 20px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(30px, 9999px, 40px, 0); }
            40% { clip: rect(75px, 9999px, 80px, 0); }
            60% { clip: rect(15px, 9999px, 25px, 0); }
            80% { clip: rect(50px, 9999px, 60px, 0); }
            100% { clip: rect(5px, 9999px, 15px, 0); }
        }

        @keyframes hardware-flicker {
            0% { opacity: 0.95; filter: brightness(1); }
            5% { opacity: 0.85; filter: brightness(0.8); }
            10% { opacity: 0.95; filter: brightness(1); }
            15% { opacity: 0.9; filter: brightness(1.1); }
            50% { opacity: 1; filter: brightness(1); }
            95% { opacity: 0.95; filter: brightness(1.2); }
            97% { opacity: 0.7; filter: brightness(0.7); }
            100% { opacity: 1; filter: brightness(1); }
        }
    </style>
</head>

<body>
    <div class="glitch-box">
        <h1>SIGNAL NOT FOUND</h1>
        <p>This sector of the Crios Universe has not been archived at this point.</p>
        <a href="/home.html" class="btn">Return to Nexus</a>
    </div>
</body>

</html>
