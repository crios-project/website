<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Crios" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIOS PROJECT // Enter</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Archivo:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-burgundy: #6b0f1a;
            --secondary-pink: #e91e63;
            --accent-cyan: #00d9ff;
            --dark-bg: #0a0a0f;
            --dark-panel: #141419;
            --text-primary: #e8e8f0;
            --text-dim: #8888a8;
            --glow-pink: 0 0 30px rgba(233, 30, 99, 0.6);
            --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        body {
            font-family: 'Archivo', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(233, 30, 99, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(233, 30, 99, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridScroll {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50px);
            }
        }

        /* Gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-burgundy), transparent);
            top: -300px;
            right: -200px;
            animation: orbFloat1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary-pink), transparent);
            bottom: -200px;
            left: -150px;
            animation: orbFloat2 25s ease-in-out infinite;
        }

        @keyframes orbFloat1 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-80px, 80px);
            }
        }

        @keyframes orbFloat2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(80px, -60px);
            }
        }

        /* Landing container */
        .landing-container {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo-container {
            position: relative;
            width: 1000px;
            max-width: 80vw;
            aspect-ratio: 1000 / 530;
            margin: 0 auto 60px;
        }

        .logo-container img {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-shadow {
            z-index: 2;
            animation: logoFade 3s ease-in-out 1s forwards;
        }

        .logo-color {
            z-index: 1;
            opacity: 1;
        }

        @keyframes logoFade {
            to {
                opacity: 0;
            }
        }

        /* Tagline */
        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .subtagline {
            font-family: 'Archivo', sans-serif;
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-dim);
            font-style: italic;
            letter-spacing: 1px;
            margin-bottom: 80px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* Continue button */
        .continue-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            background: transparent;
            border: 2px solid var(--text-dim);
            padding: 18px 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 8px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
            animation: pulse 3s ease-in-out 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                border-color: var(--text-dim);
                box-shadow: none;
            }

            50% {
                border-color: var(--secondary-pink);
                box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
            }
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(233, 30, 99, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .continue-btn:hover::before {
            left: 100%;
        }

        .continue-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: var(--glow-cyan), var(--glow-pink);
            transform: translateY(-3px);
        }

        .continue-btn:active {
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-container {
                max-width: 90vw;
                margin-bottom: 40px;
            }

            .tagline {
                font-size: 0.85rem;
                letter-spacing: 4px;
            }

            .subtagline {
                font-size: 1rem;
                margin-bottom: 60px;
            }

            .continue-btn {
                font-size: 0.85rem;
                padding: 16px 40px;
                letter-spacing: 3px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="landing-container">
        <div class="logo-container">
            <img src="assets/icons/Crios2020S.png" alt="CRIOS Logo Shadow" class="logo-shadow">
            <img src="assets/icons/Crios2020.png" alt="CRIOS Logo" class="logo-color">
        </div>
        <p class="tagline">Harmonic Convergence</p>
        <p class="subtagline">A Transmedia Storytelling Universe</p>
        <a href="home.html" class="continue-btn">[ Enter the Crios Multiverse ]</a>
    </div>
</body>

</html>
