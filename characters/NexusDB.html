    <style>
        :root {
            --cyan: #00f2ff;
            --bg: #050608;
            --panel-bg: rgba(10, 12, 16, 0.9);
            --border: 1px solid rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-columns: 350px 1fr 450px;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Ambient scanline effect */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        /* Left Sidebar: Character List */
        .directory {
            background: rgba(0, 0, 0, 0.5);
            border-right: var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .dir-header {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--cyan);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--cyan);
            padding-bottom: 5px;
        }

        .subject-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .subject-card:hover { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }
        .subject-card.active { border-color: var(--cyan); background: rgba(0, 242, 255, 0.15); }

        /* Center: Portrait Display */
        .focus-area {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: var(--border);
            background: radial-gradient(circle, rgba(0,242,255,0.05) 0%, transparent 70%);
        }

        #main-portrait {
            max-height: 85%;
            max-width: 90%;
            object-fit: contain;
        }

        /* Right: Info Panels */
        .intel-panel {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(0,0,0,0.3);
        }

        .data-block {
            background: var(--panel-bg);
            border: var(--border);
            padding: 20px;
        }

        .subject-title { font-size: 2.2rem; margin: 0; color: var(--cyan); }
        .alias-list { font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px; }

        .relationship-feed {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #9db2bf;
            line-height: 1.5;
            text-transform: none;
        }

        .label { color: var(--cyan); font-weight: bold; margin-right: 10px; }
    </style>

    let activeSubject = null;

    function init() {
        const container = document.getElementById('roster-container');
        Object.keys(characterDatabase).forEach(key => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `<strong>${key}</strong>`;
            card.onclick = () => selectSubject(key, card);
            container.appendChild(card);
        });
    }

    function selectSubject(key, element) {
        if (!activeSubject) {
            // First select: Set the main profile
            activeSubject = key;
            document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            updateProfile(key);
        } else if (activeSubject === key) {
            // Clicked same person: Reset
            activeSubject = null;
            element.classList.remove('active');
            resetUI();
        } else {
            // Clicked second person: Show relationship
            const rel = characterDatabase[activeSubject].relationships[key];
            const output = document.getElementById('display-relation');
            if (rel) {
                output.innerHTML = `<span class="label">LINK [${key}]:</span> <span style="color:var(--cyan)">${rel.connection}</span><br><br>${rel.notes}`;
            } else {
                output.innerHTML = `<span class="label">LINK [${key}]:</span> NO DATA FOUND.`;
            }
        }
    }

    function updateProfile(key) {
        const data = characterDatabase[key];
        document.getElementById('display-name').innerText = data.name;
        document.getElementById('display-alias').innerText = `AKA: ${data.alias}`;
        document.getElementById('display-status').innerText = `STATUS: ${data.status}`;
        document.getElementById('display-bio').innerText = data.bio;
        document.getElementById('main-portrait').src = data.headshot;
        document.getElementById('display-relation').innerHTML = `<span class="label">READY:</span> TARGET SECONDARY SUBJECT TO ESTABLISH LINK.`;
    }

    function resetUI() {
        document.getElementById('display-name').innerText = "NO_SELECTION";
        document.getElementById('display-alias').innerText = "---";
        document.getElementById('display-bio').innerText = "Select a subject from the left directory to initialize profile.";
        document.getElementById('main-portrait').src = "";
        document.getElementById('display-relation').innerText = "CLICK SECOND SUBJECT TO ESTABLISH LINK";
    }

    init();
