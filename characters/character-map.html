<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personnel Nexus // Intelligence Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff; /* Crios Cyan */
            --bg: #08080a;
            --panel: rgba(20, 25, 30, 0.8);
            --border: 1px solid rgba(0, 242, 255, 0.3);
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
            text-transform: uppercase;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Sidebar Roster */
        .roster {
            width: 320px;
            border-right: var(--border);
            padding: 20px;
            background: linear-gradient(to right, #0a0c10, transparent);
            overflow-y: auto;
        }

        .char-card {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.02);
        }

        .char-card:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent);
        }

        .char-card.active-subject {
            border-left: 5px solid var(--accent);
            background: rgba(0, 242, 255, 0.05);
        }

        .portrait-sm {
            width: 50px;
            height: 50px;
            background: #222;
            margin-right: 15px;
            border: 1px solid #444;
            object-fit: cover;
        }

        /* Main Display */
        .display {
            flex-grow: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .subject-header {
            grid-column: span 2;
            border-bottom: var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .subject-name {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--accent);
        }

        .data-panel {
            background: var(--panel);
            border: var(--border);
            padding: 20px;
            position: relative;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .data-panel::after {
            content: "SECURED_FILE";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 10px;
            opacity: 0.5;
        }

        .relation-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #00ffaa;
        }

        .placeholder-art {
            width: 100%;
            height: 400px;
            background: linear-gradient(45deg, #111, #1a1a1a);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
        }
    </style>
</head>
<body>

<aside class="roster">
    <div style="font-size: 12px; margin-bottom: 20px; opacity: 0.6;">// PERSONNEL_RECORDS</div>
    <div id="roster-list">
        </div>
</aside>

<main class="display">
    <header class="subject-header">
        <div class="subject-name" id="view-name">SELECT_SUBJECT</div>
        <div id="view-id" style="font-family: 'Share Tech Mono';">ID: --/---</div>
    </header>

    <div class="data-panel">
        <div class="placeholder-art" id="main-art">IMAGE_PREVIEW</div>
        <div style="margin-top: 20px;">
            <p id="view-bio" style="opacity: 0.8;">Select a profile from the left directory to begin decryption.</p>
        </div>
    </div>

    <div class="data-panel">
        <h3 style="color: var(--accent); margin-top: 0;">RELATIONAL_SCAN</h3>
        <p style="font-size: 12px; opacity: 0.6;">Target a second individual in the roster to view link data.</p>
        <div id="relation-output" class="relation-text">
            SYSTEM_IDLE: AWAITING_TARGET...
        </div>
    </div>
</main>

<script>
    // Injected from your 2016 Switch Case
    const db = {
        "Teala": {
            id: "TH-001",
            bio: "Estate Protector. High priority asset.",
            relations: {
                "Eshelia": "Teala's best friend. Moved into the Airist estate after Teala's mother died.",
                "Pyara": "Sees Pyara as her oasis; carries immense guilt over her death."
            }
        },
        "Amy": {
            id: "AH-066",
            bio: "Daughter of Marate. High volatility risk.",
            relations: {
                "Shini": "Amy delights in Shini's hatred. She knows why Shini hates her.",
                "Wentea": "One of the few people that Amy gets along with without deception."
            }
        }
        // ... more data would go here
    };

    let currentSubject = null;

    function initRoster() {
        const list = document.getElementById('roster-list');
        Object.keys(db).forEach(name => {
            const div = document.createElement('div');
            div.className = 'char-card';
            div.innerHTML = `<div class="portrait-sm"></div> <div>${name}</div>`;
            div.onclick = () => handleSelect(name, div);
            list.appendChild(div);
        });
    }

    function handleSelect(name, element) {
        if (!currentSubject) {
            // Select Primary Subject
            currentSubject = name;
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active-subject'));
            element.classList.add('active-subject');
            
            document.getElementById('view-name').innerText = name;
            document.getElementById('view-id').innerText = `ID: ${db[name].id}`;
            document.getElementById('view-bio').innerText = db[name].bio;
            document.getElementById('relation-output').innerText = "AWAITING_RELATIONAL_TARGET...";
        } else if (currentSubject === name) {
            // Deselect
            currentSubject = null;
            element.classList.remove('active-subject');
            resetView();
        } else {
            // We have a subject, now selecting a relation target
            const relation = db[currentSubject].relations[name] || "NO_ESTABLISHED_LINK_DATA.";
            document.getElementById('relation-output').innerText = `[${name.toUpperCase()}]: ${relation}`;
        }
    }

    function resetView() {
        document.getElementById('view-name').innerText = "SELECT_SUBJECT";
        document.getElementById('relation-output').innerText = "SYSTEM_IDLE...";
    }

    initRoster();
</script>

</body>
</html>
