    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-burgundy: #6b0f1a; --secondary-pink: #e91e63; --accent-cyan: #00d9ff;
            --dark-bg: #0a0a0f; --dark-panel: #141419; --text-primary: #e8e8f0; --text-dim: #8888a8;
            --glow-pink: 0 0 30px rgba(233, 30, 99, 0.6); --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.5);
        }
        body {
            font-family: 'Archivo', sans-serif; background: var(--dark-bg); color: var(--text-primary);
            min-height: 100vh; overflow-x: hidden;
        }
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(233, 30, 99, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(233, 30, 99, 0.02) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0; opacity: 0.5;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: 0; }
        .orb-1 {
            width: 500px; height: 500px; background: radial-gradient(circle, var(--primary-burgundy), transparent);
            top: -200px; right: -150px; animation: orbFloat1 20s ease-in-out infinite;
        }
        .orb-2 {
            width: 400px; height: 400px; background: radial-gradient(circle, var(--secondary-pink), transparent);
            bottom: -150px; left: -100px; animation: orbFloat2 25s ease-in-out infinite;
        }
        @keyframes orbFloat1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-80px, 80px); } }
        @keyframes orbFloat2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(80px, -60px); } }
        .header-nav {
            position: sticky; top: 0; background: rgba(10, 10, 15, 0.95); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 30, 99, 0.2); padding: 16px 24px; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-link {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--text-dim);
            text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease;
        }
        .header-link:hover { color: var(--accent-cyan); }
        .header-title {
            font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--secondary-pink);
            text-transform: uppercase; letter-spacing: 3px;
        }
        .database-container {
            position: relative; z-index: 1; display: grid; grid-template-columns: 350px 1fr 450px;
            min-height: calc(100vh - 57px); gap: 1px; background: rgba(233, 30, 99, 0.1);
        }
        .directory {
            background: rgba(10, 10, 15, 0.8); border-right: 1px solid rgba(233, 30, 99, 0.2);
            padding: 24px; overflow-y: auto; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        }
        .dir-header {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;
            color: var(--accent-cyan); margin-bottom: 20px; padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary-pink); text-transform: uppercase;
        }
        .subject-card {
            background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(233, 30, 99, 0.2);
            padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.3s ease; border-radius: 4px;
            font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;
        }
        .subject-card:hover {
            border-color: var(--accent-cyan); background: rgba(0, 217, 255, 0.1); transform: translateX(4px);
        }
        .subject-card.active {
            border-color: var(--secondary-pink);
            background: linear-gradient(135deg, rgba(107, 15, 26, 0.4), rgba(233, 30, 99, 0.2));
            box-shadow: var(--glow-pink);
        }
        .focus-area {
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.05) 0%, transparent 70%);
            border-right: 1px solid rgba(233, 30, 99, 0.2); padding: 40px; position: relative;
        }
        #main-portrait {
            max-height: 85vh; max-width: 100%; object-fit: contain; border-radius: 8px;
            filter: drop-shadow(0 0 20px rgba(233, 30, 99, 0.3));
        }
        .portrait-placeholder {
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--text-dim);
            text-align: center; text-transform: uppercase; letter-spacing: 3px;
        }
        .intel-panel {
            padding: 30px; display: flex; flex-direction: column; gap: 20px;
            background: rgba(10, 10, 15, 0.6); overflow-y: auto;
        }
        .data-block {
            background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(233, 30, 99, 0.2);
            border-radius: 8px; padding: 24px; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        }
        .subject-title {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; margin: 0 0 8px 0;
            background: linear-gradient(135deg, var(--secondary-pink), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .alias-list {
            font-family: 'Archivo', sans-serif; font-size: 0.85rem; color: var(--text-dim);
            font-style: italic; margin-bottom: 12px;
        }
        .status-line {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent-cyan);
            margin: 0; text-transform: uppercase; letter-spacing: 1px;
        }
        .bio-text { font-family: 'Archivo', sans-serif; font-size: 1rem; line-height: 1.8; color: var(--text-primary); }
        .relationship-feed { font-family: 'Archivo', sans-serif; font-size: 0.95rem; color: var(--text-primary); line-height: 1.7; }
        .label {
            font-family: 'Orbitron', sans-serif; color: var(--accent-cyan); font-weight: 700;
            margin-right: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .relation-connection { color: var(--secondary-pink); font-weight: 600; }
        @media (max-width: 1400px) { .database-container { grid-template-columns: 300px 1fr 400px; } }
        @media (max-width: 1024px) {
            .database-container { grid-template-columns: 1fr; grid-template-rows: auto auto auto; min-height: auto; }
            .directory { border-right: none; border-bottom: 1px solid rgba(233, 30, 99, 0.2); max-height: 400px; }
            .focus-area { border-right: none; border-bottom: 1px solid rgba(233, 30, 99, 0.2); min-height: 400px; padding: 20px; }
            #main-portrait { max-height: 500px; }
            .intel-panel { padding: 24px; }
            .subject-card:hover { transform: none; }
        }
        @media (max-width: 768px) {
            .header-title { font-size: 0.85rem; }
            .header-link { font-size: 0.75rem; }
            .directory { padding: 16px; max-height: 300px; }
            .dir-header { font-size: 0.75rem; }
            .subject-card { font-size: 0.85rem; padding: 12px 14px; }
            .subject-title { font-size: 1.5rem; }
            .intel-panel { padding: 16px; }
            .data-block { padding: 20px; }
            .focus-area { min-height: 300px; }
            #main-portrait { max-height: 400px; }
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(20, 20, 25, 0.5); }
        ::-webkit-scrollbar-thumb { background: var(--secondary-pink); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
    </style>

        function init() {
            const container = document.getElementById('roster-container');
            Object.keys(characterDatabase).forEach(key => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `<strong>${key}</strong>`;
                card.onclick = () => selectSubject(key, card);
                container.appendChild(card);
            });
        }

        function selectSubject(key, element) {
            if (!activeSubject) {
                // First select: Set the main profile
                activeSubject = key;
                document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
                element.classList.add('active');
                updateProfile(key);
            } else if (activeSubject === key) {
                // Clicked same person: Reset
                activeSubject = null;
                element.classList.remove('active');
                resetUI();
            } else {
                // Clicked second person: Show relationship
                const rel = characterDatabase[activeSubject].relationships[key];
                const output = document.getElementById('display-relation');
                if (rel) {
                    output.innerHTML = `<span class="label">LINK [${key}]:</span> <span style="color:var(--cyan)">${rel.connection}</span><br><br>${rel.notes}`;
                } else {
                    output.innerHTML = `<span class="label">LINK [${key}]:</span> NO DATA FOUND.`;
                }
            }
        }

        function updateProfile(key) {
    const data = characterDatabase[key];
    const portrait = document.getElementById('main-portrait');
    const placeholder = document.getElementById('portrait-placeholder');

    document.getElementById('display-name').innerText = data.name;
    document.getElementById('display-alias').innerText = `AKA: ${data.alias}`;
    document.getElementById('display-status').innerText = `STATUS: ${data.status}`;
    document.getElementById('display-bio').innerText = data.bio;
    
    // UPDATED BITS BELOW
    portrait.src = data.headshot;
    portrait.style.display = 'block'; // Make the image visible
    placeholder.style.display = 'none'; // Hide the "Select Character" text
    
    document.getElementById('display-relation').innerHTML = `<span class="label">READY:</span> TARGET SECONDARY SUBJECT TO ESTABLISH LINK.`;
}

        function resetUI() {
            document.getElementById('display-name').innerText = "NO_SELECTION";
            document.getElementById('display-alias').innerText = "---";
            document.getElementById('display-bio').innerText = "Select a subject from the left directory to initialize profile.";
            document.getElementById('main-portrait').src = "";
            document.getElementById('display-relation').innerText = "CLICK SECOND SUBJECT TO ESTABLISH LINK";
        }

        init();

    </script>
